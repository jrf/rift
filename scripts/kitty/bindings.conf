# Append to ~/.config/kitty/kitty.conf
# (assumes rift_spawn.py is at ~/.config/kitty/rift_spawn.py)

allow_remote_control yes
allow_cloning yes

map cmd+shift+t      kitten rift_spawn.py tab
map cmd+shift+enter  kitten rift_spawn.py split
# fzf picker for existing rift sessions (picked one opens in a new tab).
map cmd+shift+p      combine : send_text all \x15 : send_text all rift-pick\r
